<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ConsultADD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#000;overflow:hidden}
body{font-family:'Inter',sans-serif;color:#fff}
.root{height:100vh;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center}

/* VIDEO */
.vwrap{position:absolute;inset:0;z-index:0}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:translateY(17%);opacity:0}
.voverlay{position:absolute;inset:0;background:rgba(0,0,0,0.72)}

/* CARD */
.card{position:relative;z-index:10;width:100%;max-width:360px;padding:32px 28px;border-radius:18px;background:rgba(8,12,14,0.8);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,0.08);box-shadow:0 32px 80px rgba(0,0,0,0.6)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;border-radius:18px 18px 0 0;background:linear-gradient(90deg,transparent,rgba(45,212,191,0.4),transparent)}

/* LOGO */
.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-m{width:30px;height:30px;border-radius:8px;background:rgba(14,107,102,0.3);border:1px solid rgba(45,212,191,0.3);display:grid;place-items:center;font-family:'Instrument Serif',serif;font-size:16px;color:#2DD4BF}
.logo-name{font-family:'Instrument Serif',serif;font-size:19px;font-weight:400;color:#fff}

/* FORM */
.flabel{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,0.28);display:block;margin-bottom:7px}
.finput{display:block;width:100%;height:44px;padding:0 13px;border-radius:9px;border:1px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.04);font-size:13.5px;font-family:'Inter',sans-serif;color:#fff;outline:none;transition:border-color .15s;margin-bottom:14px}
.finput::placeholder{color:rgba(255,255,255,0.2)}
.finput:focus{border-color:rgba(45,212,191,0.4)}
.pw-wrap{position:relative;margin-bottom:20px}
.pw-wrap .finput{margin-bottom:0;padding-right:42px}
.pw-eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.25);cursor:pointer;display:grid;place-items:center;padding:4px;transition:color .15s}
.pw-eye:hover{color:rgba(255,255,255,0.6)}
.signin-btn{width:100%;height:44px;border-radius:9px;border:none;background:#0E6B66;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .2s,transform .15s}
.signin-btn:hover:not(:disabled){background:#0A4F4B;transform:translateY(-1px)}
.signin-btn:disabled{opacity:.5;cursor:not-allowed}
.err{display:none;align-items:center;gap:6px;color:#f87171;font-size:11.5px;margin-top:10px}
</style>
</head>
<body>
<div class="root">
  <div class="vwrap">
    <video id="v" muted playsinline preload="auto">
      <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_115001_bcdaa3b4-03de-47e7-ad63-ae3e392c32d4.mp4" type="video/mp4"/>
    </video>
    <div class="voverlay"></div>
  </div>

  <div class="card">
    <div class="logo">
      <div class="logo-m">C</div>
      <span class="logo-name">ConsultADD</span>
    </div>

    <label class="flabel" for="l-email">Work email</label>
    <input class="finput" id="l-email" type="email" placeholder="you@consultadd.com" autocomplete="email"/>

    <label class="flabel" for="l-pin">Password (PIN)</label>
    <div class="pw-wrap">
      <input class="finput" id="l-pin" type="password" placeholder="••••" autocomplete="current-password"/>
      <button class="pw-eye" id="pw-eye" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <button class="signin-btn" id="signin-btn" type="button">
      Sign in
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
    <div class="err" id="err-msg">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span id="err-txt"></span>
    </div>
  </div>
</div>

<script>
(function(){
  const v=document.getElementById('v');
  let raf=null,fo=false;
  function cr(){if(raf){cancelAnimationFrame(raf);raf=null}}
  function ft(t,d,cb){cr();const t0=performance.now(),f=parseFloat(v.style.opacity)||0;function s(n){const p=Math.min((n-t0)/d,1);v.style.opacity=f+(t-f)*p;if(p<1){raf=requestAnimationFrame(s)}else{v.style.opacity=t;raf=null;if(cb)cb();}}raf=requestAnimationFrame(s);}
  function fi(){fo=false;ft(1,500);}function fout(cb){fo=true;ft(0,500,cb);}
  v.addEventListener('canplay',()=>{if(parseFloat(v.style.opacity||0)<0.1)fi();},{once:true});
  v.addEventListener('timeupdate',()=>{if(!fo&&v.duration&&(v.duration-v.currentTime)<=0.55)fout(()=>{fo=false;});});
  v.addEventListener('ended',()=>{cr();v.style.opacity=0;fo=false;setTimeout(()=>{v.currentTime=0;v.play().then(fi).catch(()=>{});},100);});
  v.play().catch(()=>{});
})();
document.getElementById('pw-eye').addEventListener('click',function(){const f=document.getElementById('l-pin');f.type=f.type==='password'?'text':'password';});
const SUPA='https://tdbslwfssutwstumobge.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkYnNsd2Zzc3V0d3N0dW1vYmdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTAxNTQsImV4cCI6MjA5Mzk4NjE1NH0.oiYmHxUu4yEhxYrV7Ck9qbKiwlZuW12fSX6fJTQT8Gw';
function showErr(m){document.getElementById('err-txt').textContent=m;document.getElementById('err-msg').style.display='flex';}
function hideErr(){document.getElementById('err-msg').style.display='none';}
function resetBtn(){const b=document.getElementById('signin-btn');b.disabled=false;b.innerHTML='Sign in <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}
async function doLogin(){
  const email=document.getElementById('l-email').value.trim().toLowerCase();
  const pin=document.getElementById('l-pin').value.trim();
  hideErr();
  if(!email){showErr('Enter your email.');return;}
  if(!pin){showErr('Enter your PIN.');return;}
  const btn=document.getElementById('signin-btn');btn.disabled=true;btn.textContent='Signing in…';
  try{
    const res=await fetch(`${SUPA}/rest/v1/poc_profiles?email=eq.${encodeURIComponent(email)}&select=name,email,role,pin,color`,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    const data=await res.json();
    if(!data||!data.length){showErr('No account found.');resetBtn();return;}
    const u=data[0];
    if(u.pin!==pin){showErr('Incorrect PIN.');resetBtn();return;}
    const sess={id:u.name,name:u.name,email:u.email,role:u.role,color:u.color,is_admin:['admin','Admin','Conultadd Admin','Consultadd Admin'].includes(u.role)};
    localStorage.setItem('rl_session',JSON.stringify(sess));
    window.location.href='https://emailreplydashboard-production.up.railway.app';
  }catch(e){showErr('Connection error.');resetBtn();}
}
document.getElementById('signin-btn').addEventListener('click',doLogin);
document.getElementById('l-pin').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('l-email').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('l-pin').focus();});
</script>
</body>
</html>
