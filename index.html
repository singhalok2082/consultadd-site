<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ConsultADD — Tech Talent & Government Digital Services</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#000;overflow:hidden}
body{font-family:'Inter',sans-serif;color:#fff}

.root{height:100vh;width:100%;position:relative;overflow:hidden;display:flex;flex-direction:column}

/* VIDEO */
.vwrap{position:absolute;inset:0;z-index:0}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:translateY(17%);opacity:0}
.voverlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.5) 0%,rgba(0,0,0,0.08) 28%,rgba(0,0,0,0.28) 60%,rgba(0,0,0,0.82) 100%)}

/* GLASS */
.glass{background:rgba(255,255,255,0.01);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);border:none;box-shadow:inset 0 1px 1px rgba(255,255,255,0.1);position:relative;overflow:hidden}
.glass::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:1.4px;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,0.45) 0%,rgba(255,255,255,0.15) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.15) 80%,rgba(255,255,255,0.45) 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude}

/* NAV */
.nav{position:relative;z-index:20;padding:22px 24px;flex-shrink:0}
.nav-in{max-width:1020px;margin:0 auto;border-radius:999px;padding:11px 20px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.logo{display:flex;align-items:center;gap:10px;font-family:'Instrument Serif',serif;font-size:19px;color:#fff;font-weight:400;flex-shrink:0}
.logo-m{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);display:grid;place-items:center;font-family:'Instrument Serif',serif;font-size:15px}
.links{display:flex;gap:24px;list-style:none}
.links a{color:rgba(255,255,255,0.65);font-size:13px;font-weight:500;text-decoration:none;transition:color .2s}
.links a:hover{color:#fff}
.nav-r{display:flex;align-items:center;gap:12px}
.nbtn{background:none;border:none;color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;padding:4px 8px;transition:color .2s}
.nbtn:hover{color:#fff}
.nbtn-p{border-radius:999px;padding:9px 20px;font-size:13px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;color:#fff;border:none;transition:background .2s}
.nbtn-p:hover{background:rgba(255,255,255,0.06)}

/* HERO */
.hero{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px 60px;text-align:center;transform:translateY(-6%)}
h1{font-family:'Instrument Serif',serif;font-size:clamp(44px,7vw,80px);font-weight:400;line-height:1.06;letter-spacing:-0.025em;color:#fff;margin-bottom:20px;white-space:nowrap}
h1 em{font-style:italic;color:rgba(255,255,255,0.6)}
.sub{font-size:15px;color:rgba(255,255,255,0.42);line-height:1.7;max-width:400px;margin-bottom:44px}

/* TWO BUTTONS */
.actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn-solid{border-radius:999px;padding:13px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;background:#fff;color:#000;border:none;transition:all .2s;white-space:nowrap}
.btn-solid:hover{background:rgba(255,255,255,0.88);transform:translateY(-1px)}
.btn-outline{border-radius:999px;padding:13px 28px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;color:#fff;border:none;transition:all .2s;white-space:nowrap}
.btn-outline:hover{background:rgba(255,255,255,0.07)}

/* BOTTOM BAR */
.bottom{position:absolute;bottom:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:20px 40px}
.trust{font-size:11.5px;color:rgba(255,255,255,0.28);font-weight:500}
.trust strong{color:rgba(255,255,255,0.5)}
.socials{display:flex;gap:10px}
.sbtn{border-radius:999px;width:40px;height:40px;display:grid;place-items:center;color:rgba(255,255,255,0.45);cursor:pointer;border:none;transition:all .2s}
.sbtn:hover{color:#fff;background:rgba(255,255,255,0.06)}
.scroll-cue{display:flex;flex-direction:column;align-items:center;gap:6px;color:rgba(255,255,255,0.25);font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
.scroll-line{width:1px;height:28px;background:linear-gradient(to bottom,rgba(255,255,255,0.25),transparent);animation:sp 2s ease infinite}
@keyframes sp{0%,100%{opacity:.25}50%{opacity:.7}}
</style>
</head>
<body>
<div class="root">
  <div class="vwrap">
    <video id="v" muted playsinline preload="auto">
      <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_115001_bcdaa3b4-03de-47e7-ad63-ae3e392c32d4.mp4" type="video/mp4"/>
    </video>
    <div class="voverlay"></div>
  </div>

  <div class="nav">
    <div class="nav-in glass">
      <div class="logo"><div class="logo-m">C</div>ConsultADD</div>
      <ul class="links">
        <li><a href="#">Talent Solutions</a></li>
        <li><a href="#">Public Services</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Careers</a></li>
      </ul>
      <div class="nav-r">
        <button class="nbtn" onclick="window.location.href='https://emailreplydashboard-production.up.railway.app'">Sign in</button>
        <button class="nbtn-p glass">Connect now →</button>
      </div>
    </div>
  </div>

  <div class="hero">
    <h1>Powering the teams<br/>that <em>move the world</em></h1>
    <p class="sub">Expert tech talent for staffing firms. Secure digital transformation for government agencies.</p>
    <div class="actions">
      <button class="btn-solid">Find consultants →</button>
      <button class="btn-outline glass" onclick="window.location.href='https://emailreplydashboard-production.up.railway.app'">Sign in to Replyloop →</button>
    </div>
  </div>

  <div class="bottom">
    <div class="trust">Trusted by <strong>Fortune 1000</strong> staffing firms &amp; federal agencies</div>
    <div class="scroll-cue"><div class="scroll-line"></div>Scroll</div>
    <div class="socials">
      <button class="sbtn glass" aria-label="Instagram">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      </button>
      <button class="sbtn glass" aria-label="Twitter">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
      </button>
      <button class="sbtn glass" aria-label="LinkedIn">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
(function(){
  const v=document.getElementById('v');
  let raf=null,fo=false;
  function cr(){if(raf){cancelAnimationFrame(raf);raf=null}}
  function ft(tgt,dur,cb){cr();const t0=performance.now(),from=parseFloat(v.style.opacity)||0;function s(now){const p=Math.min((now-t0)/dur,1);v.style.opacity=from+(tgt-from)*p;if(p<1){raf=requestAnimationFrame(s)}else{v.style.opacity=tgt;raf=null;if(cb)cb();}}raf=requestAnimationFrame(s);}
  function fi(){fo=false;ft(1,500);}
  function fout(cb){fo=true;ft(0,500,cb);}
  v.addEventListener('canplay',()=>{if(parseFloat(v.style.opacity||0)<0.1)fi();},{once:true});
  v.addEventListener('timeupdate',()=>{if(!fo&&v.duration&&(v.duration-v.currentTime)<=0.55)fout(()=>{fo=false;});});
  v.addEventListener('ended',()=>{cr();v.style.opacity=0;fo=false;setTimeout(()=>{v.currentTime=0;v.play().then(fi).catch(()=>{});},100);});
  v.play().catch(()=>{});
})();
</script>
</body>
</html>
