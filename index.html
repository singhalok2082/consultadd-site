<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ConsultADD</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#000;overflow:hidden}
body{font-family:'Inter',sans-serif;color:#fff}
.root{height:100vh;width:100%;position:relative;overflow:hidden;display:flex;flex-direction:column}

/* VIDEO */
.vwrap{position:absolute;inset:0;z-index:0}
video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:translateY(17%);opacity:0}
.voverlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.55) 0%,rgba(0,0,0,0.08) 25%,rgba(0,0,0,0.28) 60%,rgba(0,0,0,0.85) 100%)}

/* GLASS */
.glass{background:rgba(255,255,255,0.01);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);border:none;box-shadow:inset 0 1px 1px rgba(255,255,255,0.1);position:relative;overflow:hidden}
.glass::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:1.4px;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,0.45) 0%,rgba(255,255,255,0.15) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.15) 80%,rgba(255,255,255,0.45) 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude}

/* NAV */
.nav{position:relative;z-index:20;padding:20px 24px;flex-shrink:0}
.nav-in{max-width:1020px;margin:0 auto;border-radius:999px;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;font-family:'Instrument Serif',serif;font-size:18px;color:#fff;font-weight:400}
.logo-m{width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);display:grid;place-items:center;font-size:14px}
.links{display:flex;gap:24px;list-style:none}
.links a{color:rgba(255,255,255,0.55);font-size:13px;font-weight:500;text-decoration:none;transition:color .2s}
.links a:hover{color:#fff}

/* BODY */
.body{position:relative;z-index:10;flex:1;display:flex;align-items:center;justify-content:center;padding:0 48px 40px;gap:80px;max-width:1060px;margin:0 auto;width:100%}

/* LEFT */
.left{flex:1;min-width:0}
h1{font-family:'Instrument Serif',serif;font-size:clamp(40px,5.5vw,68px);font-weight:400;line-height:1.06;letter-spacing:-.025em;color:#fff}
h1 em{font-style:italic;color:rgba(255,255,255,0.52)}

/* RIGHT - LOGIN */
.card{width:320px;flex-shrink:0;border-radius:18px;padding:26px 24px;background:rgba(8,12,14,0.72);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,0.07);box-shadow:0 32px 80px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.06)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;border-radius:18px 18px 0 0;background:linear-gradient(90deg,transparent,rgba(45,212,191,0.35),transparent)}
.card{position:relative}
.c-eye{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#2DD4BF;margin-bottom:14px}
.c-title{font-family:'Instrument Serif',serif;font-size:21px;font-weight:400;color:#fff;line-height:1.2;margin-bottom:22px}
.c-title em{font-style:italic;color:rgba(255,255,255,0.45)}
.flabel{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:rgba(255,255,255,0.28);display:block;margin-bottom:6px}
.finput{display:block;width:100%;height:42px;padding:0 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);font-size:13.5px;font-family:'Inter',sans-serif;color:#fff;outline:none;transition:border-color .15s;margin-bottom:13px}
.finput::placeholder{color:rgba(255,255,255,0.18)}
.finput:focus{border-color:rgba(45,212,191,0.38)}
.pw-wrap{position:relative;margin-bottom:18px}
.pw-wrap .finput{margin-bottom:0;padding-right:40px}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.22);cursor:pointer;display:grid;place-items:center;padding:4px;transition:color .15s}
.pw-eye:hover{color:rgba(255,255,255,0.55)}
.signin-btn{width:100%;height:42px;border-radius:8px;border:none;background:#0E6B66;color:#fff;font-size:13.5px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .2s,transform .15s}
.signin-btn:hover:not(:disabled){background:#0A4F4B;transform:translateY(-1px)}
.signin-btn:disabled{opacity:.5;cursor:not-allowed}
.err{display:none;align-items:center;gap:6px;color:#f87171;font-size:11.5px;font-weight:500;margin-top:10px}

/* BOTTOM */
.bottom{position:absolute;bottom:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 36px}
.trust{font-size:11px;color:rgba(255,255,255,0.18)}
.trust strong{color:rgba(255,255,255,0.35)}
.socials{display:flex;gap:8px}
.sbtn{border-radius:999px;width:34px;height:34px;display:grid;place-items:center;color:rgba(255,255,255,0.3);cursor:pointer;border:none;transition:all .2s}
.sbtn:hover{color:#fff;background:rgba(255,255,255,0.06)}
</style>
</head>
<body>
<div class="root">
  <div class="vwrap">
    <video id="v" muted playsinline preload="auto">
      <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260328_115001_bcdaa3b4-03de-47e7-ad63-ae3e392c32d4.mp4" type="video/mp4"/>
    </video>
    <div class="voverlay"></div>
  </div>

  <div class="nav">
    <div class="nav-in glass">
      <div class="logo"><div class="logo-m">C</div>ConsultADD</div>
      <ul class="links">
        <li><a href="#">Talent Solutions</a></li>
        <li><a href="#">Public Services</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Careers</a></li>
      </ul>
    </div>
  </div>

  <div class="body">
    <div class="left">
      <h1>Powering the teams<br/>that <em>move the world</em></h1>
    </div>

    <div class="card">
      <div class="c-eye">Replyloop · Reply Manager</div>
      <div class="c-title">Every reply,<br/><em>in one loop.</em></div>
      <label class="flabel" for="l-email">Work email</label>
      <input class="finput" id="l-email" type="email" placeholder="you@consultadd.com" autocomplete="email"/>
      <label class="flabel" for="l-pin">Password (PIN)</label>
      <div class="pw-wrap">
        <input class="finput" id="l-pin" type="password" placeholder="••••" autocomplete="current-password"/>
        <button class="pw-eye" id="pw-eye" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <button class="signin-btn" id="signin-btn" type="button">
        Sign in
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
      <div class="err" id="err-msg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span id="err-txt"></span>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="trust">Trusted by <strong>Fortune 1000</strong> staffing firms &amp; federal agencies</div>
    <div class="socials">
      <button class="sbtn glass" aria-label="Instagram">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      </button>
      <button class="sbtn glass" aria-label="Twitter">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>
      </button>
      <button class="sbtn glass" aria-label="LinkedIn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
(function(){
  const v=document.getElementById('v');
  let raf=null,fo=false;
  function cr(){if(raf){cancelAnimationFrame(raf);raf=null}}
  function ft(t,d,cb){cr();const t0=performance.now(),f=parseFloat(v.style.opacity)||0;function s(n){const p=Math.min((n-t0)/d,1);v.style.opacity=f+(t-f)*p;if(p<1){raf=requestAnimationFrame(s)}else{v.style.opacity=t;raf=null;if(cb)cb();}}raf=requestAnimationFrame(s);}
  function fi(){fo=false;ft(1,500);}function fout(cb){fo=true;ft(0,500,cb);}
  v.addEventListener('canplay',()=>{if(parseFloat(v.style.opacity||0)<0.1)fi();},{once:true});
  v.addEventListener('timeupdate',()=>{if(!fo&&v.duration&&(v.duration-v.currentTime)<=0.55)fout(()=>{fo=false;});});
  v.addEventListener('ended',()=>{cr();v.style.opacity=0;fo=false;setTimeout(()=>{v.currentTime=0;v.play().then(fi).catch(()=>{});},100);});
  v.play().catch(()=>{});
})();
document.getElementById('pw-eye').addEventListener('click',function(){const f=document.getElementById('l-pin');f.type=f.type==='password'?'text':'password';});
const SUPA='https://tdbslwfssutwstumobge.supabase.co';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkYnNsd2Zzc3V0d3N0dW1vYmdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTAxNTQsImV4cCI6MjA5Mzk4NjE1NH0.oiYmHxUu4yEhxYrV7Ck9qbKiwlZuW12fSX6fJTQT8Gw';
function showErr(m){document.getElementById('err-txt').textContent=m;document.getElementById('err-msg').style.display='flex';}
function hideErr(){document.getElementById('err-msg').style.display='none';}
function resetBtn(){const b=document.getElementById('signin-btn');b.disabled=false;b.innerHTML='Sign in <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';}
async function doLogin(){
  const email=document.getElementById('l-email').value.trim().toLowerCase();
  const pin=document.getElementById('l-pin').value.trim();
  hideErr();
  if(!email){showErr('Enter your email.');return;}
  if(!pin){showErr('Enter your PIN.');return;}
  const btn=document.getElementById('signin-btn');btn.disabled=true;btn.textContent='Signing in…';
  try{
    const res=await fetch(`${SUPA}/rest/v1/poc_profiles?email=eq.${encodeURIComponent(email)}&select=name,email,role,pin,color`,{headers:{'apikey':KEY,'Authorization':'Bearer '+KEY}});
    const data=await res.json();
    if(!data||!data.length){showErr('No account found.');resetBtn();return;}
    const u=data[0];
    if(u.pin!==pin){showErr('Incorrect PIN.');resetBtn();return;}
    const sess={id:u.name,name:u.name,email:u.email,role:u.role,color:u.color,is_admin:['admin','Admin','Conultadd Admin','Consultadd Admin'].includes(u.role)};
    localStorage.setItem('rl_session',JSON.stringify(sess));
    window.location.href='https://emailreplydashboard-production.up.railway.app';
  }catch(e){showErr('Connection error.');resetBtn();}
}
document.getElementById('signin-btn').addEventListener('click',doLogin);
document.getElementById('l-pin').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('l-email').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('l-pin').focus();});
</script>
</body>
</html>
